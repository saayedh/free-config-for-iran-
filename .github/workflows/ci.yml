name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/
      - name: Mypy
        run: mypy src/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tgbot_test
          POSTGRES_USER: tgbot
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run migrations
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: tgbot_test
          DB_USER: tgbot
          DB_PASSWORD: test_password
          TELEGRAM_BOT_TOKEN: "0000000000:test_token_placeholder"
          TELEGRAM_ADMIN_CHAT_ID: "123456789"
        run: alembic upgrade head
      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: tgbot_test
          DB_USER: tgbot
          DB_PASSWORD: test_password
          TELEGRAM_BOT_TOKEN: "0000000000:test_token_placeholder"
          TELEGRAM_ADMIN_CHAT_ID: "123456789"
          ENVIRONMENT: development
          LOG_FORMAT: console
        run: pytest --cov=src --cov-report=xml -v
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
